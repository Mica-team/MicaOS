name: Build MicaOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git repo bc bison build-essential curl flex g++-multilib \
            gcc-multilib gnupg gperf imagemagick lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
            openjdk-17-jdk pngcrush rsync schedtool squashfs-tools \
            unzip xsltproc zip zlib1g-dev

      - name: Configure Git
        run: |
          git config --global user.name "MicaOS"
          git config --global user.email "actions@github.com"

      - name: Initialize LineageOS
        run: |
          mkdir android
          cd android
          repo init -u https://github.com/LineageOS/android.git -b lineage-23.2 --git-lfs

      - name: Sync source
        run: |
          cd android
          repo sync -c --force-sync --no-clone-bundle --no-tags -j2

      # Add your local_manifests and device repositories here

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: MicaOS-logs
          path: android
