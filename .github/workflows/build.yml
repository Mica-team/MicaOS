name: Build MicaOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git repo openjdk-17-jdk bc bison build-essential curl flex g++-multilib gcc-multilib gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop rsync squashfs-tools unzip xsltproc zip zlib1g-dev

      - name: Configure Git
        run: |
          git config --global user.name "MicaOS CI"
          git config --global user.email "actions@github.com"

      - name: Init LineageOS
        run: |
          mkdir android
          cd android
          repo init -u https://github.com/LineageOS/android.git -b lineage-23.2 --git-lfs

      - name: Copy local manifests
        run: |
          mkdir -p android/.repo/local_manifests
          cp roomservice.xml android/.repo/local_manifests/roomservice.xml

      - name: Sync
        run: |
          cd android
          repo sync -c --force-sync --no-clone-bundle --no-tags -j2

      - name: Build
        run: |
          cd android
          source build/envsetup.sh
          lunch lineage_RMX1851-userdebug
          m bacon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MicaOS-build
          path: |
            android/out/target/product/RMX1851/*.zip
            android/out/target/product/RMX1851/*.img
